<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>MedPath LIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
:root{
  --p:#0A5C47;--p-mid:#0F7A5E;--p-light:#E8F5F0;--p-glow:rgba(10,92,71,.1);
  --teal:#0080a0;--teal-light:rgba(0,128,160,0.08);
  --accent:#C9A84C;--accent-lt:#FBF5E6;
  --danger:#C0392B;--warn:#C67C1A;--ok:#1A7F5A;
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f4f7f6;
  --t1:#1C2320;--t2:#5A6560;--t3:#8A9590;
  --b1:#D0DAD5;--b2:#E4EBE7;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --r-sm:6px;--r-md:10px;--r-lg:16px;--r-xl:22px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 20px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --sh-lg:0 16px 48px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans);background:var(--bg);color:var(--t1);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 75% 0%,rgba(10,92,71,0.06) 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 5% 90%,rgba(0,128,160,0.04) 0%,transparent 50%),
    radial-gradient(rgba(10,92,71,0.08) 1px,transparent 1px);
  background-size:auto,auto,28px 28px;
  background-attachment:fixed;
}

/* Orbs */
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);animation:orbDrift ease-in-out infinite;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(10,92,71,0.07) 0%,transparent 68%);top:-150px;right:-80px;animation-duration:28s;}
.orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(0,128,160,0.05) 0%,transparent 68%);bottom:-80px;left:-60px;animation-duration:36s;animation-delay:-10s;}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-10px,-16px) scale(1.03)}66%{transform:translate(12px,8px) scale(0.97)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-in{animation:fadeUp .28s cubic-bezier(.22,1,.36,1) both;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:var(--surface);border-bottom:1px solid var(--b2);position:sticky;top:0;z-index:50;box-shadow:0 1px 0 var(--b2),0 2px 12px rgba(0,0,0,.05);}
.logo{display:flex;align-items:center;gap:11px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--p) 0%,var(--p-mid) 100%);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(10,92,71,.28);flex-shrink:0;}
.logo-text{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--t1);letter-spacing:-.01em;}
.logo-sub{font-size:9.5px;color:var(--t3);letter-spacing:.06em;font-family:var(--mono);text-transform:uppercase;}
.nav-tabs{display:flex;gap:2px;align-items:center;}
.nav-tab{padding:6px 13px;border-radius:var(--r-md);border:none;font-size:13px;font-weight:400;cursor:pointer;background:transparent;color:var(--t2);transition:all .18s;font-family:var(--sans);}
.nav-tab:hover{background:var(--surface2);color:var(--t1);}
.nav-tab.active{background:var(--p-light);color:var(--p);font-weight:500;}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:230px;height:100vh;background:var(--surface);border-right:1px solid var(--b2);box-shadow:2px 0 20px rgba(0,0,0,.05);display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:20px 20px 18px;border-bottom:1px solid var(--b2);position:relative;}
.sidebar-logo::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--p-mid));}
.sidebar-logo .tag{font-family:var(--mono);font-size:9px;color:var(--p-mid);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;}
.sidebar-logo .name{font-family:var(--serif);font-size:19px;color:var(--t1);}
.sidebar-logo .sub{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--mono);}
.sidebar-nav{flex:1;padding:14px 0;overflow-y:auto;}
.nav-section{padding:8px 20px 4px;font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;color:var(--t2);border-left:3px solid transparent;transition:all .18s;}
.nav-item:hover{color:var(--p);background:var(--p-light);}
.nav-item.active{color:var(--p);background:var(--p-light);border-left-color:var(--p);font-weight:500;}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--b2);background:rgba(10,92,71,.02);}
.user-pill{display:flex;align-items:center;gap:9px;background:var(--p-light);border:1px solid rgba(10,92,71,.15);border-radius:var(--r-lg);padding:9px 12px;margin-bottom:10px;}
.user-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p-mid));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0;}

/* MAIN CONTENT */
.main-wrap{display:flex;min-height:100vh;}
.main-content{flex:1;margin-left:230px;padding:28px;max-width:calc(100vw - 230px);}
.page-header{margin-bottom:22px;}
.page-title{font-family:var(--serif);font-size:26px;font-weight:400;color:var(--t1);margin-bottom:3px;}
.page-sub{font-size:12.5px;color:var(--t3);font-family:var(--mono);letter-spacing:.02em;}
.section-title{font-size:10px;font-weight:600;margin-bottom:12px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--b2);border-radius:var(--r-lg);padding:20px 24px;margin-bottom:16px;box-shadow:var(--sh-sm);}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--b2);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.stat-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--p-mid));}
.stat-card.teal::before{background:linear-gradient(90deg,var(--teal),#0095b8);}
.stat-card.gold::before{background:linear-gradient(90deg,var(--accent),#B8922A);}
.stat-card.red::before{background:linear-gradient(90deg,var(--danger),#E05C4A);}
.stat-label{font-size:10px;color:var(--t3);margin-bottom:8px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;font-family:var(--mono);}
.stat-val{font-size:28px;font-weight:300;font-family:var(--serif);letter-spacing:-.02em;color:var(--t1);}
.stat-val.ok{color:var(--ok);}
.stat-val.warn{color:var(--warn);}
.stat-val.danger{color:var(--danger);}
.stat-val.teal{color:var(--teal);}

/* BUTTONS */
.btn{padding:8px 18px;border-radius:var(--r-md);border:1px solid var(--b1);font-size:13px;cursor:pointer;background:var(--surface);color:var(--t1);transition:all .18s;font-family:var(--sans);box-shadow:var(--sh-sm);}
.btn:hover{background:var(--surface2);box-shadow:var(--sh-md);}
.btn.primary{background:linear-gradient(135deg,var(--p),var(--p-mid));color:#fff;border-color:transparent;box-shadow:0 3px 14px rgba(10,92,71,.28);width:100%;padding:12px;font-size:14px;font-weight:500;}
.btn.primary:hover{opacity:.92;box-shadow:0 5px 20px rgba(10,92,71,.38);}
.btn.sm{padding:5px 12px;font-size:12px;border-radius:var(--r-sm);}
.btn.danger-sm{padding:5px 12px;font-size:12px;border-radius:var(--r-sm);color:var(--danger);border-color:#f8c5c5;background:var(--surface);}
.btn.danger-sm:hover{background:#fff5f5;}
.btn.teal{background:linear-gradient(135deg,var(--teal),#0095b8);color:#fff;border-color:transparent;box-shadow:0 3px 12px rgba(0,128,160,.25);}
.btn.accent{background:linear-gradient(135deg,var(--accent),#B8922A);color:#fff;border-color:transparent;}

/* INPUTS */
input,select,textarea{width:100%;padding:9px 13px;border:1px solid var(--b1);border-radius:var(--r-md);font-size:13px;font-family:var(--sans);color:var(--t1);background:var(--surface);outline:none;transition:border .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--p-mid);box-shadow:0 0 0 3px var(--p-glow);}
input::placeholder{color:var(--t3);}
label{font-size:11px;color:var(--t2);font-weight:500;letter-spacing:.03em;display:block;margin-bottom:5px;font-family:var(--mono);text-transform:uppercase;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:10.5px;font-weight:500;letter-spacing:.02em;font-family:var(--mono);}
.badge-ok{background:#E8F5EE;color:#176046;}
.badge-warn{background:#FEF3E2;color:#925C11;}
.badge-danger{background:#FDECEA;color:#9B2020;}
.badge-info{background:#EAF1FB;color:#1A58A0;}
.badge-gray{background:var(--surface2);color:var(--t2);}
.badge-purple{background:#F2EAFD;color:#6B31BB;}
.badge-teal{background:rgba(0,128,160,.1);color:var(--teal);}

/* AVATAR */
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p-light),#d0ebe3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--p);flex-shrink:0;border:1.5px solid rgba(10,92,71,.12);}

/* TABLE */
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--b2);}
.row:last-child{border-bottom:none;}
.glass-table{width:100%;border-collapse:collapse;min-width:460px;}
.glass-table th{background:var(--surface2);padding:9px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);border-bottom:1px solid var(--b2);}
.glass-table td{padding:9px 10px;font-size:12.5px;border-bottom:1px solid var(--b2);}
.glass-table tr:last-child td{border-bottom:none;}
.glass-table tr:hover td{background:var(--surface2);}

/* SPINNER */
.spinner{width:30px;height:30px;border:3px solid var(--b2);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite;margin:24px auto;display:block;}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{padding-left:36px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none;}

/* ALERT */
.alert{padding:10px 14px;border-radius:var(--r-md);font-size:13px;margin-bottom:14px;}
.alert-err{background:#FDECEA;border:1px solid #f8c5c5;color:#9B2020;}
.alert-ok{background:#E8F5EE;border:1px solid #b7e0cc;color:#176046;}

/* CART BAR */
.cart-bar{background:linear-gradient(135deg,var(--p),var(--p-mid));color:#fff;padding:12px 20px;border-radius:var(--r-lg);display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;box-shadow:0 4px 16px rgba(10,92,71,.28);}

/* TEST CARD */
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;}
.test-card{background:var(--surface);border:1px solid var(--b2);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:all .18s;box-shadow:var(--sh-sm);}
.test-card:hover{box-shadow:var(--sh-md);border-color:var(--b1);}
.test-card.selected{border-color:var(--p);background:var(--p-light);box-shadow:0 0 0 2px rgba(10,92,71,.15);}
.test-cat{font-size:9.5px;font-weight:600;color:var(--p-mid);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-family:var(--mono);}
.test-name{font-size:13px;font-weight:500;color:var(--t1);margin-bottom:6px;line-height:1.3;}
.test-price{font-family:var(--serif);font-size:20px;color:var(--t1);}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;overflow:hidden;background:linear-gradient(135deg,#0A5C47 0%,#0F7A5E 40%,#0080a0 100%);}
.auth-bg-logo{position:fixed;pointer-events:none;z-index:0;animation:floatLogo ease-in-out infinite;opacity:0.06;font-size:180px;user-select:none;}
.auth-bg-logo:nth-child(1){top:5%;left:10%;animation-duration:12s;animation-delay:0s;font-size:160px;}
.auth-bg-logo:nth-child(2){top:50%;right:8%;animation-duration:16s;animation-delay:-5s;font-size:200px;}
.auth-bg-logo:nth-child(3){bottom:8%;left:40%;animation-duration:14s;animation-delay:-8s;font-size:140px;}
.auth-bg-logo:nth-child(4){top:25%;left:55%;animation-duration:18s;animation-delay:-3s;font-size:120px;opacity:0.04;}
@keyframes floatLogo{0%,100%{transform:translate(0,0) rotate(0deg) scale(1);}25%{transform:translate(12px,-18px) rotate(5deg) scale(1.05);}50%{transform:translate(-8px,12px) rotate(-3deg) scale(0.95);}75%{transform:translate(16px,6px) rotate(4deg) scale(1.02);}}
@keyframes authPulse{0%,100%{opacity:0.06}50%{opacity:0.10}}
.auth-card{background:rgba(255,255,255,0.95);border:1px solid rgba(255,255,255,0.3);border-radius:var(--r-xl);padding:36px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.3),0 8px 24px rgba(0,0,0,0.2);backdrop-filter:blur(12px);position:relative;z-index:2;}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--p-mid));border-radius:var(--r-xl) var(--r-xl) 0 0;}

/* ROLE SELECT */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:460px;margin:0 auto;}
.role-card{background:rgba(255,255,255,0.92);border:1px solid rgba(255,255,255,0.3);border-radius:var(--r-xl);padding:24px 16px;cursor:pointer;text-align:center;transition:all .2s;box-shadow:0 8px 32px rgba(0,0,0,0.2);backdrop-filter:blur(8px);}
.role-card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:rgba(10,92,71,.3);}
.role-icon{width:52px;height:52px;border-radius:50%;background:var(--p-light);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;border:2px solid rgba(10,92,71,.15);}
.role-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px;}
.role-desc{font-size:11px;color:var(--t3);font-family:var(--mono);}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--b2);z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,.06);}
.bottom-nav-inner{display:flex;align-items:center;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:transparent;cursor:pointer;font-family:var(--sans);font-size:10px;color:var(--t3);transition:color .15s;}
.bnav-btn.active{color:var(--p);}
.bnav-btn .b-icon{font-size:20px;}

/* RESPONSIVE */
@media(max-width:768px){
  /* sidebar/main handled in extra_css */
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .form-grid{grid-template-columns:1fr;}
  .test-grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr));}
  .card{padding:14px;}
  .topbar-right{display:none!important;}
  .bottom-nav{display:block;}
  .mob-topbar{display:flex!important;}
  .page-title{font-size:20px;}
  .stat-val{font-size:22px;}
  .glass-table{min-width:580px;}
}
.mob-topbar{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--b2);z-index:49;padding:0 16px;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.06);}

/* MOBILE FIXES */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r-lg);}
.glass-table{width:100%;border-collapse:collapse;min-width:480px;}
.glass-table th{white-space:nowrap;}
.glass-table td{vertical-align:middle;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal{background:var(--surface);border-radius:var(--r-xl);padding:28px;width:100%;max-width:560px;box-shadow:var(--sh-lg);position:relative;margin:auto;}
.modal-title{font-family:var(--serif);font-size:22px;color:var(--t1);margin-bottom:20px;}
.modal-close{position:absolute;top:16px;right:16px;background:transparent;border:none;font-size:22px;cursor:pointer;color:var(--t3);line-height:1;padding:4px;}
/* TABS */
.tab-bar{display:flex;gap:4px;background:var(--surface2);border-radius:var(--r-md);padding:4px;margin-bottom:20px;}
.tab-btn{flex:1;padding:7px 14px;border:none;background:transparent;border-radius:var(--r-sm);font-size:13px;cursor:pointer;color:var(--t2);font-family:var(--sans);transition:all .18s;}
.tab-btn.active{background:var(--surface);color:var(--p);font-weight:500;box-shadow:var(--sh-sm);}
/* PARAM ENTRY */
.param-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1.2fr;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--b2);}
.param-row:last-child{border-bottom:none;}
.glass-table th,.glass-table td{padding:8px 10px;}
@media(max-width:480px){
  .glass-table th,.glass-table td{padding:6px 8px;font-size:11px;}
  .glass-table{min-width:420px;}
}
/* REPORT VIEWER */
.report-viewer{position:fixed;inset:0;background:#fff;z-index:300;overflow-y:auto;}
.report-actions{position:sticky;top:0;background:#fff;border-bottom:2px solid var(--b2);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.report-body{max-width:820px;margin:0 auto;padding:20px 16px 48px;}
.report-header-bar{background:linear-gradient(135deg,var(--p),var(--p-mid));color:#fff;padding:20px 24px;border-radius:var(--r-lg) var(--r-lg) 0 0;}
.report-section{border:1px solid var(--b2);padding:16px 20px;border-radius:0 0 var(--r-lg) var(--r-lg);}
.report-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:14px;}
.report-info-label{font-size:9.5px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.report-info-val{font-size:13px;font-weight:600;color:var(--t1);}
.report-table{width:100%;border-collapse:collapse;margin-top:10px;min-width:420px;}
.report-table th{background:#f0f4f8;padding:8px 12px;font-size:10px;font-weight:700;color:var(--t3);text-align:left;letter-spacing:.06em;text-transform:uppercase;border-bottom:2px solid var(--b2);white-space:nowrap;}
.report-table td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--b2);vertical-align:middle;}
.report-table tr:last-child td{border-bottom:none;}
.flag-Normal{color:var(--ok);font-weight:600;}.flag-High,.flag-Critical{color:var(--danger);font-weight:700;}.flag-Low{color:var(--warn);font-weight:700;}.flag-Borderline{color:#7B40C4;font-weight:600;}
/* RESPONSIVE OVERRIDES */
@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}.form-grid-3{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){
  .table-wrap{display:block;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .sidebar{display:none;}.main-content{margin-left:0;padding:14px 12px;padding-bottom:82px;padding-top:68px;max-width:100vw;}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px;}.form-grid{grid-template-columns:1fr;}.form-grid-3{grid-template-columns:1fr;}
  .test-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}.card{padding:14px 12px;}
  .stat-val{font-size:22px;}.page-title{font-size:20px;}.bottom-nav{display:block;}.mob-topbar{display:flex!important;}
  .role-grid{grid-template-columns:1fr 1fr;gap:10px;}.role-card{padding:16px 10px;}
  .auth-card{padding:22px 18px;}.modal{padding:20px 16px;border-radius:var(--r-lg);}
  .param-row{grid-template-columns:1fr 1fr;}.report-info-grid{grid-template-columns:1fr;}
}
@media(max-width:380px){.role-grid{grid-template-columns:1fr;}}
.scroll-hint{font-size:10px;color:var(--t3);text-align:right;padding:3px 8px;font-family:var(--mono);display:none;}
@media(max-width:768px){.scroll-hint{display:block;}}
@media print{
  .no-print{display:none!important;}.report-actions{display:none!important;}
  .sidebar,.bottom-nav,.mob-topbar{display:none!important;}
  .report-viewer{position:static;overflow:visible;}body{background:#fff!important;}
  .report-body{padding:0;max-width:100%;}
  .report-header-bar{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
/* SESSION TIMEOUT WARNING */
.session-warning{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;}
.session-warning-box{background:#fff;border-radius:var(--r-xl);padding:32px;max-width:380px;width:90%;text-align:center;box-shadow:var(--sh-lg);}
.session-warning-box h3{font-family:var(--serif);font-size:22px;color:var(--danger);margin-bottom:8px;}
.session-warning-box p{color:var(--t2);font-size:13px;margin-bottom:20px;}
.session-countdown{font-family:var(--mono);font-size:36px;font-weight:700;color:var(--danger);margin:12px 0;}
/* CHANGE PASSWORD */
.pwd-req{font-size:11px;font-family:var(--mono);padding:2px 0;}
.pwd-req.ok{color:var(--ok);}
.pwd-req.fail{color:var(--danger);}
/* AUDIT LOG */
.audit-entry{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--b2);}
.audit-entry:last-child{border-bottom:none;}
.audit-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.audit-dot.ok{background:var(--ok);}
.audit-dot.warn{background:var(--warn);}
.audit-dot.danger{background:var(--danger);}
.audit-dot.info{background:var(--teal);}
.audit-dot.gray{background:var(--t3);}

</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div id="root" style="position:relative;z-index:1;"></div>
<script>
const {useState,useEffect,useRef,createElement:h} = React;
const API = "https://medpath-production.up.railway.app";
let TOKEN = sessionStorage.getItem("mp_token")||null;

async function api(method, path, body) {
  const headers = {"Content-Type":"application/json"};
  if(TOKEN) headers["Authorization"] = "Bearer "+TOKEN;
  try {
    const res = await fetch(API+path, {method, headers, body:body?JSON.stringify(body):undefined});
    return res.json();
  } catch(e) { return {error:"Network error"}; }
}

function Badge({label,type="gray"}) {
  return h("span",{className:"badge badge-"+type},label);
}
function statusType(s) {
  return {Pending:"warn",Collected:"info",Processing:"teal",Reported:"purple",Dispatched:"ok",Cancelled:"danger"}[s]||"gray";
}
function statusLabel(s) {
  return {
    Pending:"Awaiting Collection",
    Collected:"Sample Collected",
    Processing:"Results Being Recorded",
    Reported:"Pending Doctor Review",
    Dispatched:"Report Signed & Ready",
    Cancelled:"Cancelled"
  }[s]||s;
}
function Spinner() { return h("div",{className:"spinner"}); }
function Modal({title,onClose,children}) {
  return h("div",{className:"modal-bg",onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h("div",{className:"modal"},
      h("button",{className:"modal-close",onClick:onClose},"×"),
      h("div",{className:"modal-title"},title),
      children
    )
  );
}

function RoleSelect({onSelect}) {
  const roles=[
    {id:"Patient",icon:"🧑‍⚕️",label:"Patient Portal",desc:"book.tests & reports"},
    {id:"Admin",icon:"🏥",label:"Admin Dashboard",desc:"manage.operations"},
    {id:"Technician",icon:"🔬",label:"Lab Technician",desc:"process.results"},
    {id:"Doctor",icon:"👨‍⚕️",label:"Doctor Panel",desc:"review.sign.reports"},
  ];
  return h("div",{className:"auth-wrap"},
    h("div",{className:"auth-bg-logo"},"🔬"),
    h("div",{className:"auth-bg-logo"},"🧪"),
    h("div",{className:"auth-bg-logo"},"⚗️"),
    h("div",{className:"auth-bg-logo"},"🔬"),
    h("div",{style:{width:"100%",maxWidth:500}},
      h("div",{style:{textAlign:"center",marginBottom:32}},
        h("div",{style:{display:"inline-flex",alignItems:"center",gap:12,marginBottom:16}},
          h("div",{className:"logo-icon",style:{width:48,height:48,fontSize:22}},"🔬"),
          h("div",{style:{textAlign:"left"}},
            h("div",{className:"logo-text",style:{fontFamily:"var(--serif)",fontSize:26,color:"var(--t1)"}},"MedPath LIS"),
            h("div",{className:"logo-sub",style:{fontFamily:"var(--mono)",fontSize:10,color:"var(--t3)",letterSpacing:".06em"}},"LABORATORY INFORMATION SYSTEM")
          )
        ),
        h("p",{style:{fontSize:13,color:"var(--t2)"}},"Select your role to continue")
      ),
      h("div",{className:"role-grid"},
        roles.map(r=>h("div",{key:r.id,className:"role-card fade-in",onClick:()=>onSelect(r.id)},
          h("div",{className:"role-icon"},r.icon),
          h("div",{className:"role-name"},r.label),
          h("div",{className:"role-desc"},r.desc)
        ))
      ),
      h("p",{style:{textAlign:"center",fontSize:10,color:"var(--t3)",marginTop:24,fontFamily:"var(--mono)",letterSpacing:".04em"}},"NABL ACCREDITED · ISO 15189 · 24×7 SUPPORT")
    )
  );
}

function Login({role,onLogin}) {
  const [pw,setPw]=useState("");
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("123456");
  const [step,setStep]=useState(1);
  const [name,setName]=useState("");
  const [dob,setDob]=useState("");
  const [gender,setGender]=useState("");
  const [bloodGroup,setBloodGroup]=useState("");
  const [email,setEmail]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [staffEmail,setStaffEmail]=useState("");

  async function sendOtp() {
    if(!phone||phone.length<10){setErr("Please enter valid 10-digit mobile number.");return;}
    setLoading(true);setErr("");
    await api("POST","/api/auth/otp/send",{phone:"+91"+phone});
    setLoading(false);setStep(2);
  }
  async function verifyOtp() {
    setLoading(true);setErr("");
    const fullPhone="+91"+phone;
    const data=await api("POST","/api/auth/otp/verify",{phone:fullPhone,otp,name:name||undefined,dob:dob||undefined,gender:gender||undefined,blood_group:bloodGroup||undefined,email:email||undefined});
    setLoading(false);
    if(!data){setErr("No response from server. Check connection.");return;}
    if(data.error==="Network error"){setErr("Cannot reach server. Try again.");return;}
    if(data.token){
      TOKEN=data.token;
      sessionStorage.setItem("mp_token",data.token);
      sessionStorage.setItem("mp_user",JSON.stringify({...data.user,patientId:data.user.patientId}));
      sessionStorage.setItem("mp_role","Patient");
      onLogin({...data.user,patientId:data.user.patientId});
    }
    else if(data.error==="Name required for new registration"){setStep(3);setErr("");}
    else setErr(data.error||"Verification failed. Please try again.");
  }
  async function staffLogin() {
    if(!staffEmail||!pw){setErr("Please enter your username and password.");return;}
    setLoading(true);setErr("");
    const data=await api("POST","/api/auth/login",{email:staffEmail.trim(),password:pw});
    setLoading(false);
    if(data.token){TOKEN=data.token;sessionStorage.setItem("mp_token",data.token);sessionStorage.setItem("mp_user",JSON.stringify(data.user));sessionStorage.setItem("mp_role",data.user.role.charAt(0).toUpperCase()+data.user.role.slice(1));onLogin(data.user);}
    else setErr(data.error||"Invalid credentials.");
  }

  return h("div",{className:"auth-wrap"},
    h("div",{className:"auth-bg-logo"},"🔬"),
    h("div",{className:"auth-bg-logo"},"🧪"),
    h("div",{className:"auth-bg-logo"},"⚗️"),
    h("div",{className:"auth-bg-logo"},"🔬"),
    h("div",{className:"auth-card",style:{position:"relative"}},
      h("div",{style:{height:3,background:"linear-gradient(90deg,var(--p),var(--p-mid))",borderRadius:"var(--r-xl) var(--r-xl) 0 0",position:"absolute",top:0,left:0,right:0}}),
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:24}},
        h("div",{className:"logo-icon",style:{fontSize:18}},"🔬"),
        h("div",null,
          h("div",{style:{fontFamily:"var(--serif)",fontSize:20,color:"var(--t1)"}},"MedPath LIS"),
          h("div",{style:{fontFamily:"var(--mono)",fontSize:9,color:"var(--t3)",letterSpacing:".06em",textTransform:"uppercase"}},role+" · Login")
        )
      ),
      err&&h("div",{className:"alert alert-err"},err),
      role==="Patient"&&step===1&&h("div",null,
        h("div",{className:"form-group"},
          h("label",null,"Mobile Number"),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          h("div",{style:{padding:"9px 13px",border:"1px solid var(--b1)",borderRadius:"var(--r-md)",background:"var(--surface2)",fontSize:13,fontWeight:600,color:"var(--t2)",flexShrink:0}},"+91"),
          h("input",{value:phone,onChange:e=>setPhone(e.target.value.replace(/[^0-9]/g,"")),placeholder:"9876543210",maxLength:10,style:{flex:1},type:"tel"})
        )
        ),
        
        h("button",{onClick:sendOtp,disabled:loading,className:"btn primary"},loading?"Sending OTP...":"Send OTP →")
      ),
      role==="Patient"&&step===2&&h("div",null,
        h("p",{style:{fontSize:13,color:"var(--t2)",marginBottom:14}},"OTP sent to +91 "+phone),
        h("div",{className:"form-group"},
          h("label",null,"Enter OTP"),
          h("input",{value:otp,onChange:e=>setOtp(e.target.value),placeholder:"123456",style:{textAlign:"center",letterSpacing:8,fontSize:22,fontFamily:"var(--mono)"}})
        ),
        h("p",{style:{fontSize:11,color:"var(--t3)",marginBottom:14,textAlign:"center",fontFamily:"var(--mono)"}},"Default OTP: 123456"),
        h("button",{onClick:verifyOtp,disabled:loading,className:"btn primary",style:{marginBottom:10}},loading?"Verifying...":"Verify & Login →"),
        h("button",{onClick:()=>setStep(1),className:"btn",style:{width:"100%"}},"← Change Number")
      ),
      role==="Patient"&&step===3&&h("div",null,
        h("p",{style:{fontSize:13,color:"var(--t2)",marginBottom:6}},"Welcome! Complete your profile to continue."),
        h("div",{className:"form-group"},
          h("label",null,"Full Name *"),
          h("input",{value:name,onChange:e=>setName(e.target.value),placeholder:"Enter your full name"})
        ),
        h("div",{className:"form-group"},
          h("label",null,"Date of Birth"),
          h("input",{type:"date",value:dob,onChange:e=>setDob(e.target.value)})
        ),
        h("div",{className:"form-grid"},
          h("div",{className:"form-group"},
            h("label",null,"Gender"),
            h("select",{value:gender,onChange:e=>setGender(e.target.value)},
              h("option",{value:""},"Select"),
              ["Male","Female","Other"].map(g=>h("option",{key:g,value:g},g))
            )
          ),
          h("div",{className:"form-group"},
            h("label",null,"Blood Group"),
            h("select",{value:bloodGroup,onChange:e=>setBloodGroup(e.target.value)},
              h("option",{value:""},"Select"),
              ["A+","A-","B+","B-","AB+","AB-","O+","O-"].map(g=>h("option",{key:g,value:g},g))
            )
          )
        ),
        h("div",{className:"form-group"},
          h("label",null,"Email (Optional)"),
          h("input",{type:"email",value:email,onChange:e=>setEmail(e.target.value),placeholder:"patient@email.com"})
        ),
        h("button",{onClick:verifyOtp,disabled:loading||!name,className:"btn primary",style:{marginBottom:10}},loading?"Registering...":"Complete Registration →"),
        h("button",{onClick:()=>setStep(2),className:"btn",style:{width:"100%"}},"← Back")
      ),
      role!=="Patient"&&h("div",null,
        h("div",{className:"form-group"},
          h("label",null,"Username"),
          h("input",{type:"text",value:staffEmail,onChange:e=>setStaffEmail(e.target.value),placeholder:"Enter your username (e.g. admin)",autoComplete:"username",autoCapitalize:"none"})
        ),
        h("div",{className:"form-group"},
          h("label",null,"Password"),
          h("input",{type:"password",value:pw,onChange:e=>setPw(e.target.value),placeholder:"Enter your password",autoComplete:"current-password",onKeyDown:e=>{if(e.key==="Enter")staffLogin();}})
        ),
        
        h("button",{onClick:staffLogin,disabled:loading,className:"btn primary"},loading?"Logging in...":"Login →")
      ),
      h("button",{onClick:()=>onLogin(null,true),className:"btn",style:{width:"100%",marginTop:12}},"← Back to role selection")
    )
  );
}

function Sidebar({nav,active,setActive,user,onLogout}) {
  return h("div",{className:"sidebar"},
    h("div",{className:"sidebar-logo"},
      h("div",{className:"tag"},"Laboratory LIS"),
      h("div",{className:"name"},"MedPath"),
      h("div",{className:"sub"},"v2.0 · Live System")
    ),
    h("div",{className:"sidebar-nav"},
      h("div",{className:"nav-section"},"Navigation"),
      nav.map(n=>h("div",{key:n.id,className:"nav-item"+(active===n.id?" active":""),onClick:()=>setActive(n.id)},
        h("span",{className:"icon"},n.icon),n.label
      ))
    ),
    h("div",{className:"sidebar-footer"},
      h("div",{className:"user-pill"},
        h("div",{className:"user-av"},user.name?user.name[0]:"U"),
        h("div",null,
          h("div",{style:{fontSize:12,fontWeight:500,color:"var(--t1)"}},(user.name||"").split(" ")[0]),
          h("div",{style:{fontSize:10,color:"var(--t3)",fontFamily:"var(--mono)"}},(user.role||"").toLowerCase())
        )
      ),
      h("button",{onClick:onLogout,className:"btn",style:{width:"100%",fontSize:12}},"Sign Out")
    )
  );
}

function MobTopbar({user,active,nav,onLogout}) {
  const curr=nav.find(n=>n.id===active);
  return h("div",{className:"mob-topbar"},
    h("div",{style:{display:"flex",alignItems:"center",gap:9}},
      h("div",{style:{width:30,height:30,background:"linear-gradient(135deg,var(--p),var(--p-mid))",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}},"🔬"),
      h("div",{style:{fontFamily:"var(--serif)",fontSize:17,color:"var(--t1)"}},"MedPath")
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:10}},
      curr&&h("div",{style:{fontSize:11,color:"var(--t2)",fontFamily:"var(--mono)"}},(curr.icon+" "+curr.label).toLowerCase()),
      h("button",{onClick:onLogout,style:{background:"transparent",border:"1px solid var(--b1)",borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",color:"var(--t2)",fontFamily:"var(--sans)"}},"Sign Out")
    )
  );
}
function AppShell({nav,active,setActive,user,onLogout,children}) {
  return h("div",{className:"main-wrap"},
    h(MobTopbar,{user,active,nav,onLogout}),
    h(Sidebar,{nav,active,setActive,user,onLogout}),
    h("div",{className:"main-content"},children),
    h(BottomNav,{nav,active,setActive})
  );
}

function BottomNav({nav,active,setActive}) {
  return h("nav",{className:"bottom-nav"},
    h("div",{className:"bottom-nav-inner"},
      nav.map(n=>h("button",{key:n.id,className:"bnav-btn"+(active===n.id?" active":""),onClick:()=>setActive(n.id)},
        h("span",{className:"b-icon"},n.icon),n.label
      ))
    )
  );
}

function ReportViewer({reportId,onClose,showSendActions}) {
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [msg,setMsg]=useState("");
  useEffect(()=>{
    api("GET","/api/reports/"+reportId+"/full").then(d=>{if(d.report)setData(d);setLoading(false);});
  },[reportId]);
  async function doEmail(){setMsg("Sending...");const r=await api("POST","/api/reports/"+reportId+"/send-email",{});setMsg(r.message||r.error||"");}
  async function doWA(){const r=await api("GET","/api/reports/"+reportId+"/whatsapp-link");if(r.link)window.open(r.link,"_blank");else setMsg(r.error||"Failed");}
  function doPDF(){window.open(API+"/api/reports/"+reportId+"/pdf","_blank");}
  if(loading)return h("div",{className:"report-viewer"},h("div",{style:{padding:40}},h(Spinner)));
  if(!data)return h("div",{className:"report-viewer"},h("div",{className:"report-actions"},h("button",{onClick:onClose,className:"btn sm"},"← Back")),h("div",{style:{padding:40,color:"var(--danger)",textAlign:"center"}},"Report not found"));
  const {report,results=[]}=data;
  const age=report.date_of_birth?new Date().getFullYear()-new Date(report.date_of_birth).getFullYear()+" Yrs":"—";
  const fc=f=>"flag-"+(f||"Normal");
  return h("div",{className:"report-viewer"},
    h("div",{className:"report-actions no-print"},
      h("button",{onClick:onClose,className:"btn sm"},"← Back"),
      h("button",{onClick:()=>window.print(),className:"btn sm"},"🖨 Print"),
      h("button",{onClick:doPDF,className:"btn sm teal",style:{color:"#fff"}},"⬇ PDF"),
      showSendActions&&h("button",{onClick:doWA,className:"btn sm",style:{background:"#25D366",color:"#fff",border:"none"}},"💬 WhatsApp"),
      showSendActions&&h("button",{onClick:doEmail,className:"btn sm",style:{background:"#1A73E8",color:"#fff",border:"none"}},"✉ Email"),
      msg&&h("span",{style:{fontSize:12,color:"var(--ok)",fontFamily:"var(--mono)"}},msg)
    ),
    h("div",{className:"report-body"},
      h("div",{className:"report-header-bar"},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}},
          h("div",null,
            h("div",{style:{fontSize:20,fontWeight:700}},"🔬 MedPath Laboratory"),
            h("div",{style:{fontSize:9,opacity:.75,fontFamily:"var(--mono)",letterSpacing:".08em",marginTop:4}},"NABL ACCREDITED · ISO 15189 · 24×7 LABORATORY SERVICES")
          ),
          h("div",{style:{textAlign:"right"}},
            h("div",{style:{fontFamily:"var(--mono)",fontSize:10,opacity:.7}},"REPORT NO"),
            h("div",{style:{fontFamily:"var(--mono)",fontSize:16,fontWeight:700}},report.report_no||"—"),
            h("div",{style:{fontFamily:"var(--mono)",fontSize:10,opacity:.6,marginTop:4}},new Date(report.signed_at||report.created_at).toLocaleDateString("en-IN"))
          )
        )
      ),
      h("div",{className:"report-section"},
        h("div",{style:{textAlign:"center",padding:"8px 0 12px",fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--p)",letterSpacing:".1em"}},"LABORATORY INVESTIGATION REPORT"),
        h("div",{style:{background:"var(--surface2)",borderRadius:"var(--r-md)",padding:"14px 16px",marginBottom:14}},
          h("div",{className:"report-info-grid"},
            h("div",null,h("div",{className:"report-info-label"},"Patient Name"),h("div",{className:"report-info-val"},report.patient_name)),
            h("div",null,h("div",{className:"report-info-label"},"Report No"),h("div",{className:"report-info-val",style:{color:"var(--p)"}},report.report_no||"—")),
            h("div",null,h("div",{className:"report-info-label"},"Patient ID"),h("div",{className:"report-info-val"},report.patient_no)),
            h("div",null,h("div",{className:"report-info-label"},"Sample No"),h("div",{className:"report-info-val"},report.sample_no)),
            h("div",null,h("div",{className:"report-info-label"},"Age / Sex"),h("div",{className:"report-info-val"},age+" / "+(report.gender||"—"))),
            h("div",null,h("div",{className:"report-info-label"},"Collected"),h("div",{className:"report-info-val"},report.collected_at?new Date(report.collected_at).toLocaleDateString("en-IN"):"—")),
            h("div",null,h("div",{className:"report-info-label"},"Blood Group"),h("div",{className:"report-info-val"},report.blood_group||"—")),
            h("div",null,h("div",{className:"report-info-label"},"Report Date"),h("div",{className:"report-info-val"},new Date(report.signed_at||report.created_at).toLocaleDateString("en-IN")))
          )
        ),
        h("div",{style:{fontFamily:"var(--mono)",fontSize:10,fontWeight:700,color:"var(--p)",letterSpacing:".06em",marginBottom:8}},"TEST: "+report.test_name+" ("+report.code+")"),
        results.length===0&&h("p",{style:{color:"var(--t3)",fontSize:13}},"No results recorded yet."),
        results.length>0&&h("div",{className:"table-wrap"},
          h("table",{className:"report-table"},
            h("thead",null,h("tr",null,["Test","Parameter","Result","Unit","Ref Range","Flag"].map(c=>h("th",{key:c},c)))),
            h("tbody",null,results.map((r,i)=>h("tr",{key:i,style:{background:r.flag==="High"||r.flag==="Critical"?"rgba(192,57,43,0.04)":r.flag==="Low"?"rgba(198,124,26,0.04)":"transparent"}},
              i===0&&h("td",{rowSpan:results.length,style:{verticalAlign:"top",paddingTop:10,fontWeight:600,fontSize:12,color:"var(--p)",borderRight:"1px solid var(--b2)"}},report.test_name),
              h("td",{style:{fontWeight:500}},r.param_name),
              h("td",{style:{fontWeight:700,color:r.flag==="High"||r.flag==="Critical"?"var(--danger)":r.flag==="Low"?"var(--warn)":"inherit"}},r.value||"—"),
              h("td",{style:{color:"var(--t3)"}},r.unit||"—"),
              h("td",{style:{fontFamily:"var(--mono)",fontSize:12,color:"var(--t2)"}},r.ref_range||"—"),
              h("td",null,h("span",{className:fc(r.flag)},r.flag||"Normal"))
            )))
          )
        ),
        report.tech_notes&&h("div",{style:{marginTop:14}},
          h("div",{style:{fontSize:10,fontWeight:600,color:"var(--t3)",fontFamily:"var(--mono)",marginBottom:4}},"TECHNICIAN NOTES"),
          h("div",{style:{fontSize:13,color:"var(--t2)",background:"var(--surface2)",padding:"10px 14px",borderRadius:"var(--r-md)"}},report.tech_notes)
        ),
        report.pathologist_note&&h("div",{style:{marginTop:14}},
          h("div",{style:{fontSize:10,fontWeight:600,color:"var(--t3)",fontFamily:"var(--mono)",marginBottom:4}},"PATHOLOGIST REMARKS"),
          h("div",{style:{fontSize:13,color:"var(--t2)",background:"var(--p-light)",padding:"10px 14px",borderRadius:"var(--r-md)"}},report.pathologist_note)
        ),
        h("div",{style:{borderTop:"2px solid var(--b2)",paddingTop:16,marginTop:20,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:16}},
          h("div",null,
            report.tech_notes&&h("div",{style:{fontSize:11,color:"var(--t3)",fontFamily:"var(--mono)",marginBottom:4}},"Processed by: "+(report.tech_name||"Lab Technician"))
          ),
          h("div",{style:{textAlign:"center",minWidth:220}},
            h("div",{style:{height:32}}),
            h("div",{style:{borderTop:"1.5px solid #333",paddingTop:8}}),
            h("div",{style:{fontWeight:700,fontSize:14,color:"var(--t1)"}},report.pathologist_name||"—"),
            h("div",{style:{fontSize:11,color:"var(--t2)",marginTop:2}},report.pathologist_designation||"Pathologist / Lab Director"),
            report.pathologist_qualification&&h("div",{style:{fontSize:11,color:"var(--t3)"}},report.pathologist_qualification),
            h("div",{style:{fontSize:11,color:"var(--t3)",fontFamily:"var(--mono)",marginTop:4}},
              report.signed_at?new Date(report.signed_at).toLocaleDateString("en-IN")+" "+new Date(report.signed_at).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}):"—"
            ),
            h("div",{style:{marginTop:8}},report.is_signed?h(Badge,{label:"Digitally Verified",type:"ok"}):h(Badge,{label:"Pending Verification",type:"warn"}))
          )
        ),
        h("div",{style:{marginTop:18,padding:"10px 14px",background:"var(--surface2)",borderRadius:"var(--r-md)",fontSize:11,color:"var(--t3)",textAlign:"center",fontFamily:"var(--mono)"}},"This report is generated electronically by MedPath Laboratory. Results should be interpreted in clinical context.")
      )
    )
  );
}
</script>
<script src="js/app-patient-admin.js"></script>
<script src="js/app-tech-doctor.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedPath LIS</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0A0E27;min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0A0E27 0%,#1a1040 30%,#0d2b4a 60%,#0a3a3a 100%);}
.bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.3) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(14,165,165,0.3) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(168,85,247,0.1) 0%,transparent 70%);}
.glass{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;padding:14px 24px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;box-shadow:0 4px 20px rgba(99,102,241,0.4);}
.btn-teal{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(14,165,165,0.3);}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-weight:600;}
.inp{width:100%;padding:13px 16px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;transition:border .2s;}
.inp::placeholder{color:rgba(255,255,255,0.4);}
.inp:focus{border-color:rgba(99,102,241,0.6);background:rgba(255,255,255,0.12);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;}
.stat-card{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:16px;text-align:center;}
.glass-table{width:100%;border-collapse:collapse;color:#fff;}
.glass-table th{background:rgba(99,102,241,0.3);padding:12px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.glass-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.05);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}

/* Desktop Sidebar */
.sidebar{width:220px;min-height:100vh;background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;padding:0 0 20px;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:10;}
.main-content{margin-left:220px;min-height:100vh;padding:24px;}
.top-bar{display:none;}

/* Mobile */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;min-height:auto;position:fixed;bottom:0;left:0;right:0;top:auto;flex-direction:row;padding:0;border-right:none;border-top:1px solid rgba(255,255,255,0.1);z-index:100;}
  .sidebar-header{display:none !important;}
  .sidebar-footer{display:none !important;}
  .sidebar-nav{display:flex;flex-direction:row;width:100%;padding:4px;gap:0;overflow-x:auto;}
  .sidebar-nav button{flex:1;min-width:55px;flex-direction:column !important;padding:6px 2px !important;font-size:9px !important;gap:2px !important;border-left:none !important;border-top:2px solid transparent !important;border-radius:0 !important;justify-content:center;align-items:center;text-align:center;}
  .sidebar-nav button span{font-size:18px !important;}
  .main-content{margin-left:0;padding:14px;padding-bottom:85px;padding-top:65px;}
  .top-bar{display:flex;position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);padding:10px 16px;align-items:center;justify-content:space-between;z-index:99;}
}
</style>
</head>
<body>
<div class="bg"></div>
<div id="root" style="position:relative;z-index:1;"></div>
<script>
const {useState,useEffect,createElement:h} = React;
const API = "https://medpath-production.up.railway.app";
let TOKEN = null;

async function api(method, path, body) {
  const headers = {"Content-Type":"application/json"};
  if(TOKEN) headers["Authorization"] = "Bearer "+TOKEN;
  try {
    const res = await fetch(API+path, {method, headers, body:body?JSON.stringify(body):undefined});
    return res.json();
  } catch(e) { return {error:"Network error"}; }
}

function Badge({label,color}) {
  return h("span",{className:"badge",style:{background:color+"33",color,border:"1px solid "+color+"55"}},label);
}
function Spinner() {
  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",padding:40,color:"rgba(255,255,255,0.5)",fontSize:14}},"⏳ Loading...");
}
function StatCard({icon,label,value,gradient}) {
  return h("div",{className:"stat-card fade-in"},
    h("div",{style:{fontSize:28,marginBottom:6}},icon),
    h("div",{style:{fontSize:20,fontWeight:800,background:gradient,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}},value),
    h("div",{style:{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:4,textTransform:"uppercase",letterSpacing:.5}},label)
  );
}

function RoleSelect({onSelect}) {
  const roles=[
    {id:"Patient",icon:"🧑‍⚕️",label:"Patient Portal",desc:"Book tests & reports",gradient:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
    {id:"Admin",icon:"🏥",label:"Admin Dashboard",desc:"Manage operations",gradient:"linear-gradient(135deg,#0ea5e9,#6366f1)"},
    {id:"Technician",icon:"🔬",label:"Lab Technician",desc:"Process results",gradient:"linear-gradient(135deg,#14b8a6,#0ea5e9)"},
    {id:"Doctor",icon:"👨‍⚕️",label:"Doctor Panel",desc:"Review & sign",gradient:"linear-gradient(135deg,#f59e0b,#ef4444)"},
  ];
  return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}},
    h("div",{style:{textAlign:"center",marginBottom:36}},
      h("div",{style:{fontSize:60,marginBottom:12,filter:"drop-shadow(0 0 20px rgba(99,102,241,0.5))"}}, "🔬"),
      h("h1",{style:{fontSize:32,fontWeight:800,background:"linear-gradient(135deg,#fff,#a5b4fc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",letterSpacing:1}},"MedPath LIS"),
      h("p",{style:{color:"rgba(255,255,255,0.4)",marginTop:8,fontSize:13}},"Laboratory Information System · Live")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,width:"100%",maxWidth:400}},
      roles.map(r=>h("button",{key:r.id,onClick:()=>onSelect(r.id),style:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,padding:"22px 14px",cursor:"pointer",fontFamily:"inherit",textAlign:"center",backdropFilter:"blur(12px)"}},
        h("div",{style:{width:52,height:52,borderRadius:"50%",background:r.gradient,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 10px",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}},r.icon),
        h("div",{style:{fontWeight:700,fontSize:13,color:"#fff",marginBottom:3}},r.label),
        h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)"}},r.desc)
      ))
    ),
    h("p",{style:{color:"rgba(255,255,255,0.2)",marginTop:28,fontSize:11,textAlign:"center"}},"NABL Accredited · ISO 15189 · 24×7 Support")
  );
}

function Login({role,onLogin}) {
  const [pw,setPw]=useState("");
  const [phone,setPhone]=useState("");
  const [otp,setOtp]=useState("");
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const creds={Admin:"admin",Technician:"tech123",Doctor:"doc123"};
  const gradients={Patient:"linear-gradient(135deg,#6366f1,#8b5cf6)",Admin:"linear-gradient(135deg,#0ea5e9,#6366f1)",Technician:"linear-gradient(135deg,#14b8a6,#0ea5e9)",Doctor:"linear-gradient(135deg,#f59e0b,#ef4444)"};
  const icons={Patient:"🧑‍⚕️",Admin:"🏥",Technician:"🔬",Doctor:"👨‍⚕️"};

  async function sendOtp() {
    setLoading(true);setErr("");
    await api("POST","/api/auth/otp/send",{phone});
    setLoading(false);setStep(2);
  }
  async function verifyOtp() {
    setLoading(true);setErr("");
    const data=await api("POST","/api/auth/otp/verify",{phone,otp});
    setLoading(false);
    if(data.token){TOKEN=data.token;onLogin({...data.user,patientId:data.user.patientId});}
    else setErr("Wrong OTP. Please use 123456");
  }
  async function staffLogin() {
    setLoading(true);setErr("");
    const emailMap={Admin:"admin@medpath.com",Technician:"suresh@medpath.com",Doctor:"anita@medpath.com"};
    const data=await api("POST","/api/auth/login",{email:emailMap[role],password:pw});
    setLoading(false);
    if(data.token){TOKEN=data.token;onLogin(data.user);}
    else setErr("Wrong password. Try: "+creds[role]);
  }

  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    h("div",{className:"glass",style:{width:"100%",maxWidth:380,padding:32}},
      h("div",{style:{textAlign:"center",marginBottom:26}},
        h("div",{style:{width:60,height:60,borderRadius:"50%",background:gradients[role],display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 12px",boxShadow:"0 8px 24px rgba(0,0,0,0.3)"}},icons[role]),
        h("h2",{style:{color:"#fff",fontSize:20,fontWeight:700,marginBottom:4}},"MedPath LIS"),
        h("span",{style:{background:gradients[role],WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontSize:13,fontWeight:600}},role+" Login")
      ),
      err&&h("div",{style:{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#fca5a5"}},err),
      role==="Patient"&&step===1&&h("div",null,
        h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.5)",marginBottom:8,textTransform:"uppercase",letterSpacing:.8}},"Mobile Number"),
        h("input",{className:"inp",value:phone,onChange:e=>setPhone(e.target.value),placeholder:"+91 9XXXXXXXXX",style:{marginBottom:8}}),
        h("p",{style:{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:16}},"Demo: +919876543210"),
        h("button",{onClick:sendOtp,disabled:loading,className:"btn-primary"},loading?"Sending...":"Send OTP →")
      ),
      role==="Patient"&&step===2&&h("div",null,
        h("p",{style:{fontSize:13,color:"rgba(255,255,255,0.5)",marginBottom:14}},"OTP sent to "+phone),
        h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.5)",marginBottom:8,textTransform:"uppercase",letterSpacing:.8}},"Enter OTP"),
        h("input",{className:"inp",value:otp,onChange:e=>setOtp(e.target.value),placeholder:"123456",style:{marginBottom:8,letterSpacing:6,fontSize:22,textAlign:"center"}}),
        h("p",{style:{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:14,textAlign:"center"}},"Use OTP: 123456"),
        h("button",{onClick:verifyOtp,disabled:loading,className:"btn-primary",style:{marginBottom:10}},loading?"Verifying...":"Verify & Login ✓"),
        h("p",{style:{textAlign:"center",fontSize:12,color:"rgba(99,102,241,0.8)",cursor:"pointer"},onClick:()=>setStep(1)},"← Change Number")
      ),
      role!=="Patient"&&h("div",null,
        h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.5)",marginBottom:8,textTransform:"uppercase",letterSpacing:.8}},"Password"),
        h("input",{type:"password",className:"inp",value:pw,onChange:e=>setPw(e.target.value),placeholder:"Enter password",style:{marginBottom:8}}),
        h("p",{style:{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:14}},"Demo: "+creds[role]),
        h("button",{onClick:staffLogin,disabled:loading,className:"btn-primary"},loading?"Logging in...":"Login →")
      ),
      h("p",{style:{textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:18,cursor:"pointer"},onClick:()=>onLogin(null,true)},"← Back to role selection")
    )
  );
}

function Sidebar({nav,active,setActive,user,onLogout,gradient}) {
  return h("div",{className:"sidebar"},
    h("div",{className:"sidebar-header",style:{padding:"22px 18px 18px",borderBottom:"1px solid rgba(255,255,255,0.08)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10}},
        h("div",{style:{width:34,height:34,borderRadius:10,background:gradient,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"🔬"),
        h("div",null,
          h("div",{style:{color:"#fff",fontWeight:700,fontSize:15}},"MedPath"),
          h("div",{style:{color:"rgba(255,255,255,0.3)",fontSize:9,letterSpacing:.8,textTransform:"uppercase"}},"Live System")
        )
      )
    ),
    h("div",{className:"sidebar-nav",style:{flex:1,padding:"10px 8px"}},
      nav.map(n=>h("button",{key:n.id,onClick:()=>setActive(n.id),style:{
        width:"100%",display:"flex",alignItems:"center",gap:10,
        padding:"11px 12px",borderRadius:12,marginBottom:3,border:"none",
        cursor:"pointer",fontFamily:"inherit",fontSize:13,textAlign:"left",
        background:active===n.id?"rgba(255,255,255,0.12)":"transparent",
        color:active===n.id?"#fff":"rgba(255,255,255,0.45)",
        fontWeight:active===n.id?600:400,
        borderLeft:active===n.id?"3px solid #6366f1":"3px solid transparent",
      }},
        h("span",{style:{fontSize:18}},n.icon),n.label
      ))
    ),
    h("div",{className:"sidebar-footer",style:{padding:"14px 12px",borderTop:"1px solid rgba(255,255,255,0.08)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
        h("div",{style:{width:34,height:34,borderRadius:"50%",background:gradient,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700}},user.name?user.name[0]:"U"),
        h("div",null,
          h("div",{style:{color:"#fff",fontSize:12,fontWeight:600}},user.name),
          h("div",{style:{color:"rgba(255,255,255,0.35)",fontSize:10}},user.email||user.role)
        )
      ),
      h("button",{onClick:onLogout,style:{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.5)",borderRadius:10,padding:"7px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}},"Sign Out")
    )
  );
}

function TopBar({user,gradient}) {
  return h("div",{className:"top-bar"},
    h("div",{style:{display:"flex",alignItems:"center",gap:8}},
      h("div",{style:{width:28,height:28,borderRadius:8,background:gradient,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}},"🔬"),
      h("div",{style:{color:"#fff",fontWeight:700,fontSize:15}},"MedPath")
    ),
    h("div",{style:{color:"rgba(255,255,255,0.5)",fontSize:12}},user.name)
  );
}

function PatientApp({user,onLogout}) {
  const [active,setActive]=useState("dashboard");
  const [cart,setCart]=useState([]);
  const [tests,setTests]=useState([]);
  const [samples,setSamples]=useState([]);
  const [bills,setBills]=useState([]);
  const nav=[
    {id:"dashboard",icon:"🏠",label:"Home"},
    {id:"tests",icon:"🧪",label:"Tests"},
    {id:"reports",icon:"📄",label:"Reports"},
    {id:"billing",icon:"💳",label:"Billing"},
    {id:"profile",icon:"👤",label:"Profile"},
  ];
  const total=cart.reduce((s,t)=>s+Number(t.price),0);
  const gradient="linear-gradient(135deg,#6366f1,#8b5cf6)";

  useEffect(()=>{
    api("GET","/api/tests").then(d=>{ if(d.tests) setTests(d.tests); });
    if(user.patientId) {
      api("GET","/api/samples?limit=10").then(d=>{ if(d.samples) setSamples(d.samples); });
      api("GET","/api/billing").then(d=>{ if(d.invoices) setBills(d.invoices); });
    }
  },[]);

  async function bookTests() {
    if(!cart.length) return;
    const data=await api("POST","/api/samples",{patient_id:user.patientId,test_ids:cart.map(t=>t.id),collection_type:"Walk-in",priority:"Normal"});
    if(data.sample){setSamples(prev=>[data.sample,...prev]);setCart([]);alert("✅ Booked! Sample: "+data.sample.sample_no);}
    else{alert("Booked! (Demo mode)");setCart([]);}
  }

  async function payBill(billId) {
    const data=await api("PATCH","/api/billing/"+billId+"/pay",{payment_mode:"UPI"});
    if(data.invoice) setBills(prev=>prev.map(b=>b.id===billId?data.invoice:b));
  }

  function Dashboard() {
    const ready=samples.filter(s=>s.status==="Reported"||s.status==="Dispatched").length;
    const pending=bills.filter(b=>!b.paid).reduce((s,b)=>s+Number(b.total),0);
    return h("div",{className:"fade-in"},
      h("div",{style:{marginBottom:20}},
        h("h2",{style:{color:"#fff",fontSize:20,fontWeight:700,marginBottom:4}},"Hello, "+user.name.split(" ")[0]+" 👋"),
        h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:12}},"MedPath · Live System")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}},
        [{icon:"🧪",label:"Tests Booked",value:samples.length,gradient:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
         {icon:"📄",label:"Reports Ready",value:ready,gradient:"linear-gradient(135deg,#10b981,#059669)"},
         {icon:"💳",label:"Pending ₹",value:pending,gradient:"linear-gradient(135deg,#f59e0b,#ef4444)"},
         {icon:"🛒",label:"In Cart",value:cart.length,gradient:"linear-gradient(135deg,#0ea5e9,#6366f1)"},
        ].map(s=>h(StatCard,{key:s.label,...s}))
      ),
      h("div",{className:"glass",style:{padding:18}},
        h("h3",{style:{color:"#fff",fontSize:14,fontWeight:600,marginBottom:12}},"⚡ Quick Actions"),
        nav.filter(n=>n.id!=="dashboard"&&n.id!=="profile").map(n=>
          h("button",{key:n.id,onClick:()=>setActive(n.id),style:{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",cursor:"pointer",marginBottom:8,fontFamily:"inherit",fontWeight:500,fontSize:13,color:"rgba(255,255,255,0.8)",textAlign:"left"}},
            h("span",{style:{fontSize:18}},n.icon),n.label,
            h("span",{style:{marginLeft:"auto",color:"rgba(99,102,241,0.8)"}},"›")
          )
        )
      )
    );
  }

  function Tests() {
    const [search,setSearch]=useState("");
    const inCart=id=>cart.find(c=>c.id===id);
    const toggle=t=>setCart(prev=>inCart(t.id)?prev.filter(c=>c.id!==t.id):[...prev,t]);
    const filtered=tests.filter(t=>t.name.toLowerCase().includes(search.toLowerCase())||t.category.toLowerCase().includes(search.toLowerCase()));
    return h("div",{className:"fade-in"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}},
        h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700}},"🧪 Book Tests"),
        cart.length>0&&h("div",{className:"glass",style:{padding:"8px 14px",display:"flex",alignItems:"center",gap:10}},
          h("div",null,
            h("div",{style:{fontSize:10,color:"rgba(255,255,255,0.5)"}}),cart.length+" selected",
            h("div",{style:{fontSize:16,fontWeight:800,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"₹"+total)
          ),
          h("button",{onClick:bookTests,className:"btn-teal",style:{fontSize:12,padding:"7px 12px"}},"Book ✓")
        )
      ),
      h("input",{className:"inp",value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Search tests...",style:{marginBottom:12}}),
      tests.length===0&&h(Spinner),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}},
        filtered.map(t=>{
          const sel=inCart(t.id);
          return h("div",{key:t.id,onClick:()=>toggle(t),style:{background:sel?"rgba(99,102,241,0.2)":"rgba(255,255,255,0.05)",border:"1px solid "+(sel?"rgba(99,102,241,0.5)":"rgba(255,255,255,0.1)"),borderRadius:14,padding:14,cursor:"pointer",backdropFilter:"blur(12px)"}},
            h("div",{style:{fontSize:10,fontWeight:600,color:"rgba(99,102,241,0.8)",marginBottom:4,textTransform:"uppercase",letterSpacing:.5}},t.category),
            h("div",{style:{fontWeight:600,fontSize:12,color:"#fff",marginBottom:4,lineHeight:1.3}},t.name),
            t.fasting_required&&h("div",{style:{fontSize:10,color:"#fbbf24",marginBottom:4}},"⚠️ Fasting"),
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}},
              h("div",{style:{fontSize:15,fontWeight:800,color:sel?"#a5b4fc":"#fff"}},"₹"+t.price),
              h("div",{style:{width:22,height:22,borderRadius:"50%",background:sel?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700}},sel?"✓":"+")
            )
          );
        })
      )
    );
  }

  function Reports() {

        [{icon:"✅",label:"Paid",value:"₹"+bills.filter(b=>b.paid).reduce((s,b)=>s+Number(b.total),0),gradient:"linear-gradient(135deg,#10b981,#059669)"},
         {icon:"⏳",label:"Due",value:"₹"+bills.filter(b=>!b.paid).reduce((s,b)=>s+Number(b.total),0),gradient:"linear-gradient(135deg,#ef4444,#dc2626)"},
         {icon:"🧾",label:"Total",value:bills.length,gradient:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
        ].map(s=>h(StatCard,{key:s.label,...s}))
      ),
      bills.length===0&&h("div",{className:"glass",style:{padding:24,textAlign:"center"}},h("p",{style:{color:"rgba(255,255,255,0.4)"}},"No invoices yet.")),
      h("div",{className:"glass",style:{overflow:"hidden"}},
        bills.map((b,i)=>h("div",{key:b.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 16px",borderBottom:i<bills.length-1?"1px solid rgba(255,255,255,0.05)":"none",flexWrap:"wrap",gap:8}},
          h("div",null,
            h("div",{style:{fontWeight:600,color:"#fff",fontSize:13}},b.invoice_no),
            h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}},(b.test_names||[]).join(", ")),
            h("div",{style:{fontSize:10,color:"rgba(255,255,255,0.3)"}},new Date(b.created_at).toLocaleDateString())
          ),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            h("div",{style:{fontWeight:700,color:"#fff"}},"₹"+b.total),
            h(Badge,{label:b.paid?"Paid":"Due",color:b.paid?"#10b981":"#ef4444"}),
            !b.paid&&h("button",{onClick:()=>payBill(b.id),className:"btn-sm",style:{background:"rgba(239,68,68,0.2)",color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)"}},"Pay")
          )
        ))
      )
    );

  function Profile() {
    return h("div",{className:"fade-in"},
      h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700,marginBottom:14}},"👤 My Profile"),
      h("div",{className:"glass",style:{padding:22,maxWidth:400}},
        h("div",{style:{display:"flex",gap:14,alignItems:"center",marginBottom:20}},
          h("div",{style:{width:60,height:60,borderRadius:"50%",background:gradient,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:24,fontWeight:700,boxShadow:"0 4px 20px rgba(99,102,241,0.4)"}},user.name?user.name[0]:"P"),
          h("div",null,
            h("div",{style:{fontSize:17,fontWeight:700,color:"#fff"}},user.name),
            h("div",{style:{fontSize:12,color:"rgba(255,255,255,0.4)"}},user.patientNo||"—"),
            h("div",{style:{fontSize:12,color:"rgba(255,255,255,0.4)"}},user.phone||"")
          )
        ),
        [["Role",user.role||"Patient"],["Patient No",user.patientNo||"—"],["Phone",user.phone||"—"],["Email",user.email||"—"]].map(([k,v])=>
          h("div",{key:k,style:{padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,0.06)"}},
            h("div",{style:{fontSize:10,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:.8,marginBottom:3}},k),
            h("div",{style:{fontSize:13,fontWeight:500,color:"#fff"}},v)
          )
        ),
        h("button",{onClick:onLogout,style:{width:"100%",marginTop:16,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#fca5a5",borderRadius:10,padding:"10px",cursor:"pointer",fontSize:13,fontFamily:"inherit",fontWeight:600}},"Sign Out")
      )
    );
  }

  const pages={dashboard:h(Dashboard),tests:h(Tests),reports:h(Reports),billing:h(Billing),profile:h(Profile)};
  return h("div",{style:{display:"flex",minHeight:"100vh"}},
    h(TopBar,{user,gradient}),
    h(Sidebar,{nav,active,setActive,user,onLogout,gradient}),

function AdminApp({user,onLogout}) {
  const [active,setActive]=useState("dashboard");
  const [samples,setSamples]=useState([]);
  const [bills,setBills]=useState([]);
  const [stats,setStats]=useState({});
  const gradient="linear-gradient(135deg,#0ea5e9,#6366f1)";
  const nav=[
    {id:"dashboard",icon:"🏠",label:"Home"},
    {id:"samples",icon:"🔬",label:"Samples"},
    {id:"patients",icon:"👥",label:"Patients"},
    {id:"billing",icon:"💰",label:"Billing"},
    {id:"tests",icon:"🧪",label:"Tests"},
  ];
  const statusColor={Pending:"#f59e0b",Collected:"#0ea5e9",Processing:"#6366f1",Reported:"#a855f7",Dispatched:"#10b981",Cancelled:"#ef4444"};
  const statusOrder=["Pending","Collected","Processing","Reported","Dispatched"];

  useEffect(()=>{
    api("GET","/api/dashboard").then(d=>{ if(d.stats) setStats(d.stats); });
    api("GET","/api/samples?limit=20").then(d=>{ if(d.samples) setSamples(d.samples); });
    api("GET","/api/billing?limit=20").then(d=>{ if(d.invoices) setBills(d.invoices); });
  },[]);

  async function advanceSample(id,currentStatus) {
    const next=statusOrder[statusOrder.indexOf(currentStatus)+1];
    if(!next) return;
    const data=await api("PATCH","/api/samples/"+id+"/status",{status:next});
    if(data.sample) setSamples(prev=>prev.map(s=>s.id===id?{...s,status:next}:s));
  }
  async function markPaid(id) {
    const data=await api("PATCH","/api/billing/"+id+"/pay",{payment_mode:"Manual"});
    if(data.invoice) setBills(prev=>prev.map(b=>b.id===id?data.invoice:b));
  }

  function Dashboard() {
    return h("div",{className:"fade-in"},
      h("div",{style:{marginBottom:20}},
        h("h2",{style:{color:"#fff",fontSize:20,fontWeight:700,marginBottom:4}},"Admin Dashboard 🏥"),
        h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:12}},"Live · "+new Date().toDateString())
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:16}},
        [{icon:"🧪",label:"Today Samples",value:stats.today_samples||0,gradient:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
         {icon:"👥",label:"Total Patients",value:stats.total_patients||0,gradient:"linear-gradient(135deg,#0ea5e9,#6366f1)"},
         {icon:"⏳",label:"Pending",value:stats.pending_samples||0,gradient:"linear-gradient(135deg,#f59e0b,#ef4444)"},
         {icon:"🚗",label:"Home Today",value:stats.home_today||0,gradient:"linear-gradient(135deg,#a855f7,#6366f1)"},
        ].map(s=>h(StatCard,{key:s.label,...s}))
      ),
      h("div",{className:"glass",style:{padding:18}},
        h("h3",{style:{color:"#fff",fontSize:14,fontWeight:600,marginBottom:12}},"Recent Samples"),
        samples.length===0&&h(Spinner),
        samples.slice(0,5).map(s=>h("div",{key:s.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}},
          h("div",null,
            h("div",{style:{fontWeight:600,fontSize:13,color:"#fff"}},s.patient_name||"Patient"),
            h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)"}},s.sample_no+" · "+(s.test_codes||[]).join(", "))
          ),
          h(Badge,{label:s.status,color:statusColor[s.status]||"#8A9BB0"})
        ))
      )
    );
  }

  function Samples() {
    return h("div",{className:"fade-in"},
      h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700,marginBottom:14}},"🔬 Sample Tracking"),
      samples.length===0&&h(Spinner),
      h("div",{style:{overflowX:"auto"}},
        h("table",{className:"glass-table",style:{borderRadius:16,overflow:"hidden",backdropFilter:"blur(12px)"}},
          h("thead",null,h("tr",null,["Sample","Patient","Tests","Status","Priority","Action"].map(col=>h("th",{key:col},col)))),
          h("tbody",null,
            samples.map(s=>h("tr",{key:s.id},
              h("td",{style:{fontWeight:700,color:"#a5b4fc",fontSize:11}},s.sample_no),
              h("td",{style:{color:"#fff",fontSize:12}},s.patient_name||"—"),
              h("td",{style:{color:"rgba(255,255,255,0.5)",fontSize:11}},(s.test_codes||[]).join(", ")),
              h("td",null,h(Badge,{label:s.status,color:statusColor[s.status]||"#8A9BB0"})),
              h("td",null,h(Badge,{label:s.priority||"Normal",color:s.priority==="Urgent"?"#ef4444":"#6b7280"})),
              h("td",null,s.status!=="Dispatched"&&s.status!=="Cancelled"&&h("button",{onClick:()=>advanceSample(s.id,s.status),className:"btn-sm",style:{background:"rgba(99,102,241,0.2)",color:"#a5b4fc",border:"1px solid rgba(99,102,241,0.3)"}},"→"))
            ))
          )
        )
      )
    );
  }

  function Patients() {
    const [patients,setPatients]=useState([]);
    const [loading,setLoading]=useState(true);
    useEffect(()=>{ api("GET","/api/patients?limit=20").then(d=>{if(d.patients)setPatients(d.patients);setLoading(false);}); },[]);
    return h("div",{className:"fade-in"},
      h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700,marginBottom:14}},"👥 Patients"),
      loading&&h(Spinner),
      h("div",{style:{overflowX:"auto"}},
        h("table",{className:"glass-table",style:{borderRadius:16,overflow:"hidden",backdropFilter:"blur(12px)"}},
          h("thead",null,h("tr",null,["No","Name","Age","Blood","Phone","Joined"].map(col=>h("th",{key:col},col)))),
          h("tbody",null,
            patients.map(p=>h("tr",{key:p.id},
              h("td",{style:{color:"#a5b4fc",fontWeight:700,fontSize:11}},p.patient_no),
              h("td",{style:{color:"#fff",fontWeight:600,fontSize:12}},p.name),
              h("td",{style:{color:"rgba(255,255,255,0.5)",fontSize:11}},(p.date_of_birth?new Date().getFullYear()-new Date(p.date_of_birth).getFullYear()+"yr":"—")),
              h("td",null,p.blood_group&&h(Badge,{label:p.blood_group,color:"#ef4444"})),
              h("td",{style:{color:"rgba(255,255,255,0.5)",fontSize:11}},p.phone||"—"),
              h("td",{style:{color:"rgba(255,255,255,0.3)",fontSize:10}},new Date(p.created_at).toLocaleDateString())
            ))
          )
        )
      )
    );
  }

  function Billing() {
    const total=bills.reduce((s,b)=>s+Number(b.total),0);
    const collected=bills.filter(b=>b.paid).reduce((s,b)=>s+Number(b.total),0);
    return h("div",{className:"fade-in"},
      h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700,marginBottom:14}},"💰 Billing"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}},
        [{icon:"💰",label:"Total",value:"₹"+total,gradient:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
         {icon:"✅",label:"Collected",value:"₹"+collected,gradient:"linear-gradient(135deg,#10b981,#059669)"},
         {icon:"⏳",label:"Outstanding",value:"₹"+(total-collected),gradient:"linear-gradient(135deg,#ef4444,#dc2626)"},
         {icon:"🧾",label:"Invoices",value:bills.length,gradient:"linear-gradient(135deg,#0ea5e9,#6366f1)"},
        ].map(s=>h(StatCard,{key:s.label,...s}))
      ),
      h("div",{style:{overflowX:"auto"}},
        h("table",{className:"glass-table",style:{borderRadius:16,overflow:"hidden",backdropFilter:"blur(12px)"}},
          h("thead",null,h("tr",null,["Invoice","Patient","Amount","Status","Action"].map(col=>h("th",{key:col},col)))),
          h("tbody",null,
            bills.map(b=>h("tr",{key:b.id},
              h("td",{style:{color:"#a5b4fc",fontWeight:700,fontSize:11}},b.invoice_no),
              h("td",{style:{color:"#fff",fontSize:12}},b.patient_name||"—"),
              h("td",{style:{fontWeight:700,color:"#fff"}},"₹"+b.total),
              h("td",null,h(Badge,{label:b.paid?"Paid":"Due",color:b.paid?"#10b981":"#ef4444"})),
              h("td",null,!b.paid&&h("button",{onClick:()=>markPaid(b.id),className:"btn-sm",style:{background:"rgba(239,68,68,0.2)",color:"#fca5a5",border:"1px solid rgba(239,68,68,0.3)"}},"Mark Paid"))
            ))
          )
        )
      )
    );
  }

  function ManageTests() {
    const [tests,setTests]=useState([]);
    const [loading,setLoading]=useState(true);
    const [editing,setEditing]=useState(null);
    const [form,setForm]=useState({name:"",category:"",price:"",turnaround_hrs:"6",fasting_required:false});
    const [adding,setAdding]=useState(false);
    useEffect(()=>{ api("GET","/api/tests").then(d=>{if(d.tests)setTests(d.tests);setLoading(false);}); },[]);
    async function saveEdit(id) {
      const data=await api("PUT","/api/tests/"+id,{name:form.name,category:form.category,price:Number(form.price),turnaround_hrs:Number(form.turnaround_hrs),fasting_required:form.fasting_required,is_active:true});
      if(data.test){setTests(prev=>prev.map(t=>t.id===id?data.test:t));setEditing(null);}
      else alert("Update failed");
    }
    async function addTest() {
      const data=await api("POST","/api/tests",{code:form.name.substring(0,6).toUpperCase().replace(/\s/g,""),name:form.name,category:form.category,price:Number(form.price),turnaround_hrs:Number(form.turnaround_hrs)||6,fasting_required:form.fasting_required});
      if(data.test){setTests(prev=>[...prev,data.test]);setAdding(false);setForm({name:"",category:"",price:"",turnaround_hrs:"6",fasting_required:false});}
      else alert("Failed: "+JSON.stringify(data.error));
    }
    async function toggleActive(test) {
      const data=await api("PUT","/api/tests/"+test.id,{name:test.name,category:test.category,price:Number(test.price),turnaround_hrs:Number(test.turnaround_hrs),fasting_required:test.fasting_required,is_active:!test.is_active});
      if(data.test) setTests(prev=>prev.map(t=>t.id===test.id?data.test:t));
    }
    const inp2={width:"100%",padding:"9px 12px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,color:"#fff",fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:8};
    return h("div",{className:"fade-in"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
        h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700}},"🧪 Manage Tests"),
        h("button",{onClick:()=>setAdding(!adding),className:"btn-teal",style:{fontSize:12,padding:"8px 14px"}},adding?"Cancel":"+ Add")
      ),
      adding&&h("div",{className:"glass",style:{padding:18,marginBottom:14}},
        h("h3",{style:{color:"#a5b4fc",marginBottom:12,fontSize:13}},"Add New Test"),
        h("input",{style:inp2,value:form.name,onChange:e=>setForm({...form,name:e.target.value}),placeholder:"Test Name *"}),
        h("input",{style:inp2,value:form.category,onChange:e=>setForm({...form,category:e.target.value}),placeholder:"Category *"}),
        h("input",{type:"number",style:inp2,value:form.price,onChange:e=>setForm({...form,price:e.target.value}),placeholder:"Price (₹) *"}),
        h("input",{type:"number",style:inp2,value:form.turnaround_hrs,onChange:e=>setForm({...form,turnaround_hrs:e.target.value}),placeholder:"Turnaround Hours"}),
        h("label",{style:{display:"flex",alignItems:"center",gap:8,color:"rgba(255,255,255,0.6)",fontSize:13,marginBottom:12,cursor:"pointer"}},
          h("input",{type:"checkbox",checked:form.fasting_required,onChange:e=>setForm({...form,fasting_required:e.target.checked})}),"Fasting Required"
        ),
        h("button",{onClick:addTest,className:"btn-teal"},"Save Test ✓")
      ),
      loading&&h(Spinner),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}},
        tests.map(t=>
          editing===t.id
          ?h("div",{key:t.id,className:"glass",style:{padding:14,border:"1px solid rgba(99,102,241,0.4)"}},
            h("input",{style:inp2,value:form.name,onChange:e=>setForm({...form,name:e.target.value}),placeholder:"Name"}),
            h("input",{style:inp2,value:form.category,onChange:e=>setForm({...form,category:e.target.value}),placeholder:"Category"}),
            h("input",{type:"number",style:inp2,value:form.price,onChange:e=>setForm({...form,price:e.target.value}),placeholder:"Price"}),
            h("input",{type:"number",style:inp2,value:form.turnaround_hrs,onChange:e=>setForm({...form,turnaround_hrs:e.target.value}),placeholder:"Hours"}),
            h("label",{style:{display:"flex",alignItems:"center",gap:6,color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:8,cursor:"pointer"}},
              h("input",{type:"checkbox",checked:form.fasting_required,onChange:e=>setForm({...form,fasting_required:e.target.checked})}),"Fasting"
            ),
            h("div",{style:{display:"flex",gap:6}},
              h("button",{onClick:()=>saveEdit(t.id),className:"btn-sm",style:{background:"rgba(16,185,129,0.2)",color:"#6ee7b7",border:"1px solid rgba(16,185,129,0.3)",flex:1}},"Save ✓"),
              h("button",{onClick:()=>setEditing(null),className:"btn-sm",style:{background:"rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.5)",border:"1px solid rgba(255,255,255,0.1)",flex:1}},"✕")
            )
          )
          :h("div",{key:t.id,className:"glass",style:{padding:14,opacity:t.is_active?1:0.5}},
            h("div",{style:{fontSize:10,color:"rgba(99,102,241,0.8)",fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}},t.category),
            h("div",{style:{fontWeight:600,color:"#fff",fontSize:12,marginBottom:4,lineHeight:1.3}},t.name),
            h("div",{style:{fontSize:16,fontWeight:800,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:8}},"₹"+t.price),
            t.fasting_required&&h("div",{style:{fontSize:10,color:"#fbbf24",marginBottom:6}},"⚠️ Fasting"),
            h("div",{style:{display:"flex",gap:6}},
              h("button",{onClick:()=>{setEditing(t.id);setForm({name:t.name,category:t.category,price:t.price,turnaround_hrs:t.turnaround_hrs,fasting_required:t.fasting_required});},className:"btn-sm",style:{background:"rgba(99,102,241,0.2)",color:"#a5b4fc",border:"1px solid rgba(99,102,241,0.3)",flex:1}},"Edit"),
              h("button",{onClick:()=>toggleActive(t),className:"btn-sm",style:{background:t.is_active?"rgba(239,68,68,0.15)":"rgba(16,185,129,0.15)",color:t.is_active?"#fca5a5":"#6ee7b7",border:"1px solid "+(t.is_active?"rgba(239,68,68,0.3)":"rgba(16,185,129,0.3)"),flex:1}},t.is_active?"Off":"On")
            )
          )
        )
      )
    );
  }

  const pages={dashboard:h(Dashboard),samples:h(Samples),patients:h(Patients),billing:h(Billing),tests:h(ManageTests)};
  return h("div",{style:{display:"flex",minHeight:"100vh"}},
    h(TopBar,{user,gradient}),
    h(Sidebar,{nav,active,setActive,user,onLogout,gradient}),
    h("div",{className:"main-content"},pages[active]||pages.dashboard)
  );
}

function TechApp({user,onLogout}) {
  const [active,setActive]=useState("dashboard");

  async function markReported(id) {

  function Dashboard() {

      h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700,marginBottom:16}},"Hello, "+user.name.split(" ")[0]+" 👋"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}},
        [{icon:"🧪",label:"Processing",value:samples.filter(s=>s.status==="Processing").length,gradient:"linear-gradient(135deg,#6366f1,#8b5cf6)"},
         {icon:"⚡",label:"Urgent",value:samples.filter(s=>s.priority==="Urgent").length,gradient:"linear-gradient(135deg,#ef4444,#dc2626)"},
         {icon:"✅",label:"Done",value:samples.filter(s=>s.status==="Reported").length,gradient:"linear-gradient(135deg,#10b981,#059669)"},
        ].map(s=>h(StatCard,{key:s.label,...s}))
      ),
      h("div",{className:"glass",style:{padding:18}},
        h("h3",{style:{color:"#fff",fontSize:14,fontWeight:600,marginBottom:12}},"My Queue"),
        samples.length===0&&h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:13,textAlign:"center",padding:16}},"✅ All clear!"),
        samples.map(s=>h("div",{key:s.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",flexWrap:"wrap",gap:8}},
          h("div",null,
            h("div",{style:{fontWeight:600,fontSize:12,color:"#fff"}},s.sample_no+" · "+(s.patient_name||"Patient")),
            h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)"}},(s.test_codes||[]).join(", "))
          ),
          h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
            s.priority==="Urgent"&&h(Badge,{label:"URGENT",color:"#ef4444"}),
            h(Badge,{label:s.status,color:statusColor[s.status]||"#8A9BB0"}),
            s.status==="Processing"&&h("button",{onClick:()=>markReported(s.id),className:"btn-sm",style:{background:"rgba(16,185,129,0.2)",color:"#6ee7b7",border:"1px solid rgba(16,185,129,0.3)"}},"Done ✓")
          )
        ))
      )
    );
  }
  const pages={dashboard:h(Dashboard),results:h(Dashboard)};
  return h("div",{style:{display:"flex",minHeight:"100vh"}},
    h(TopBar,{user,gradient}),
    h(Sidebar,{nav,active,setActive,user,onLogout,gradient}),
    h("div",{className:"main-content"},pages[active]||pages.dashboard)
  );
}

function DoctorApp({user,onLogout}) {
  const [active,setActive]=useState("dashboard");
  const [samples,setSamples]=useState([]);
  const gradient="linear-gradient(135deg,#f59e0b,#ef4444)";
  const nav=[{id:"dashboard",icon:"🏠",label:"Home"},{id:"patients",icon:"👥",label:"Patients"}];
  useEffect(()=>{ api("GET","/api/samples?status=Reported&limit=20").then(d=>{if(d.samples)setSamples(d.samples);}); },[]);
  async function signReport(id) {
    const data=await api("PATCH","/api/samples/"+id+"/status",{status:"Dispatched",notes:"Approved by "+user.name});
    if(data.sample) setSamples(prev=>prev.map(s=>s.id===id?{...s,status:"Dispatched"}:s));
  }
  function Dashboard() {
    return h("div",{className:"fade-in"},
      h("h2",{style:{color:"#fff",fontSize:18,fontWeight:700,marginBottom:16}},"Doctor Dashboard 👨‍⚕️"),
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}},
        [{icon:"📄",label:"To Review",value:samples.length,gradient:"linear-gradient(135deg,#f59e0b,#ef4444)"},
         {icon:"✅",label:"Signed",value:0,gradient:"linear-gradient(135deg,#10b981,#059669)"},
         {icon:"⚠️",label:"Critical",value:0,gradient:"linear-gradient(135deg,#ef4444,#dc2626)"},
        ].map(s=>h(StatCard,{key:s.label,...s}))
      ),
      h("div",{className:"glass",style:{padding:18}},
        h("h3",{style:{color:"#fff",fontSize:14,fontWeight:600,marginBottom:12}},"Pending Sign-off"),
        samples.length===0&&h("p",{style:{color:"rgba(255,255,255,0.4)",fontSize:13,textAlign:"center",padding:16}},"✅ No reports pending!"),
        samples.map(s=>h("div",{key:s.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",flexWrap:"wrap",gap:8}},
          h("div",null,
            h("div",{style:{fontWeight:600,fontSize:12,color:"#fff"}},s.patient_name||"Patient"),
            h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.4)"}},s.sample_no+" · "+(s.test_codes||[]).join(", "))
          ),
          h("button",{onClick:()=>signReport(s.id),className:"btn-sm",style:{background:"rgba(16,185,129,0.2)",color:"#6ee7b7",border:"1px solid rgba(16,185,129,0.3)"}},"Sign ✓")
        ))
      )
    );
  }
  const pages={dashboard:h(Dashboard),patients:h(Dashboard)};
  return h("div",{style:{display:"flex",minHeight:"100vh"}},
    h(TopBar,{user,gradient}),
    h(Sidebar,{nav,active,setActive,user,onLogout,gradient}),
    h("div",{className:"main-content"},pages[active]||pages.dashboard)
  );
}

function App() {
  const [role,setRole]=useState(null);
  const [user,setUser]=useState(null);
  function handleLogin(u,back){if(back){setRole(null);setUser(null);TOKEN=null;}else setUser(u);}
  function handleLogout(){setUser(null);setRole(null);TOKEN=null;}
  if(!role) return h(RoleSelect,{onSelect:setRole});
  if(!user) return h(Login,{role,onLogin:handleLogin});
  if(role==="Patient") return h(PatientApp,{user,onLogout:handleLogout});
  if(role==="Admin") return h(AdminApp,{user,onLogout:handleLogout});
  if(role==="Technician") return h(TechApp,{user,onLogout:handleLogout});
  if(role==="Doctor") return h(DoctorApp,{user,onLogout:handleLogout});
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App,null));
</script>
</body>
</html>
